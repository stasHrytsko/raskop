<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Раскоп — прототип</title>
<style>
  :root{
    --earth:#181210;
    --earth-2:#241B16;
    --cell:#2E231C;
    --cell-open:#1E1713;
    --sand:#E8DCC4;
    --sand-dim:#9C8F78;
    --amber:#F2A33C;
    --ember:#E06A2B;
    --danger:#C8443A;
    --gem:#3EC6A8;
    --line:#3A2D24;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--earth);
    color:var(--sand);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100dvh;overflow:hidden;
    user-select:none;-webkit-user-select:none;
  }
  #app{width:100%;max-width:430px;min-height:100dvh;display:flex;flex-direction:column;padding:14px 14px calc(14px + env(safe-area-inset-bottom))}

  /* ---------- top bar ---------- */
  .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:10px}
  .lvl{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--sand-dim)}
  .lvl b{color:var(--sand)}
  .dives{font-size:15px;letter-spacing:3px}
  .dives .on{color:var(--amber)} .dives .off{color:#4a3b2e}

  .quota{margin-bottom:12px}
  .quota-label{display:flex;justify-content:space-between;font-size:13px;color:var(--sand-dim);margin-bottom:5px}
  .quota-label b{color:var(--sand);font-variant-numeric:tabular-nums}
  .bar{height:8px;background:var(--earth-2);border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--gem);width:0%;transition:width .35s ease;border-radius:4px}

  /* ---------- grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
  .c{
    aspect-ratio:1;border-radius:9px;background:var(--cell);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(16px,5.4vw,24px);font-weight:700;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    cursor:pointer;position:relative;
    transition:transform .08s ease, background .15s ease;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.04), 0 2px 0 rgba(0,0,0,.35);
  }
  .c:active{transform:scale(.93)}
  .c.open{
    background:var(--cell-open);border-color:#2a211b;box-shadow:none;cursor:default;
    animation:pop .18s ease;
  }
  @keyframes pop{from{transform:scale(.8)}to{transform:scale(1)}}
  .c.open.n0{color:#5c5044}
  .c.open .num{color:var(--sand-dim)}
  .c.open .num.warm{color:var(--amber)}
  .c.open .num.hot{color:var(--ember)}
  .c .loot{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
  .c .loot .ic{font-size:clamp(14px,4.6vw,20px);line-height:1}
  .c .loot .v{font-size:11px;color:var(--gem);font-weight:800}
  .c.trap{background:#3a1512;border-color:var(--danger);animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  .fly{position:fixed;font-weight:800;color:var(--gem);font-size:15px;pointer-events:none;z-index:60;animation:fly .7s ease forwards}
  @keyframes fly{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-34px)}}

  /* ---------- backpack / greed ---------- */
  .pack{
    background:var(--earth-2);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:12px;
  }
  .pack-row{display:flex;justify-content:space-between;align-items:baseline}
  .pack-row .sum{font-family:ui-monospace,Menlo,monospace;font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
  .pack-row .sum small{font-size:13px;color:var(--sand-dim);font-weight:600}
  .mult{font-size:14px;font-weight:800;color:var(--sand-dim)}
  .mult.x2{color:var(--amber)} .mult.x3{color:var(--ember)}
  .fuse{height:6px;background:#15100d;border-radius:3px;margin-top:9px;position:relative;overflow:hidden}
  .fuse i{display:block;height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--amber),var(--ember));transition:width .3s ease}
  .fuse .tick{position:absolute;top:-2px;bottom:-2px;width:2px;background:#5c4a36}
  .fuse-hint{font-size:11.5px;color:var(--sand-dim);margin-top:6px}
  .fuse-hint b{color:var(--amber)}

  /* ---------- buttons ---------- */
  .btn{
    width:100%;border:none;border-radius:14px;padding:15px;
    font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;
    transition:transform .08s ease,opacity .15s;
  }
  .btn:active{transform:scale(.97)}
  .btn-leave{background:var(--amber);color:#241500}
  .btn-leave:disabled{background:#3d3327;color:#74664f;cursor:default}
  .btn-ghost{background:transparent;color:var(--sand-dim);border:1px solid var(--line);margin-top:8px}
  .btn-go{background:var(--gem);color:#062019}

  /* ---------- overlay ---------- */
  .ovl{
    position:fixed;inset:0;background:rgba(10,7,5,.86);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:22px;z-index:50;
    animation:fade .2s ease;
  }
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{
    width:100%;max-width:340px;background:var(--earth-2);border:1px solid var(--line);
    border-radius:18px;padding:24px 20px;text-align:center;
  }
  .card h2{font-size:21px;margin-bottom:10px;letter-spacing:.01em}
  .card p{font-size:14.5px;line-height:1.5;color:var(--sand-dim);margin-bottom:8px}
  .card p b{color:var(--sand)}
  .card .big{font-size:34px;font-weight:800;font-family:ui-monospace,Menlo,monospace;margin:8px 0 14px}
  .card .ok{color:var(--gem)} .card .bad{color:var(--danger)} .card .amb{color:var(--amber)}
  .rules{text-align:left;font-size:14px;line-height:1.55;color:var(--sand-dim);margin:14px 0 18px}
  .rules div{margin-bottom:9px;display:flex;gap:9px}
  .rules .i{flex:0 0 22px;text-align:center}
  .title{font-size:26px;font-weight:800;letter-spacing:.04em}
  .subtitle{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:14px}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="lvl">Уровень <b id="lvl">1</b></div>
    <div class="dives" id="dives"></div>
  </div>
  <div class="quota">
    <div class="quota-label"><span>Цель уровня</span><b><span id="prog">0</span> / <span id="quota">25</span> 💰</b></div>
    <div class="bar"><i id="qbar"></i></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="pack">
    <div class="pack-row">
      <div class="sum">🎒 <span id="pack">0</span> <small>× <span id="multTxt">1</span> = <span id="total">0</span></small></div>
      <div class="mult" id="mult">×1</div>
    </div>
    <div class="fuse"><i id="fuse"></i><span class="tick" style="left:55.5%"></span><span class="tick" style="left:88.8%"></span></div>
    <div class="fuse-hint" id="fuseHint"></div>
  </div>

  <button class="btn btn-leave" id="leaveBtn">Уйти и забрать 0</button>
</div>

<div id="ovl"></div>

<script>
(()=>{
const SIZE=6, TRAPS=4;
const QUOTA0=25, QUOTA_STEP=10, DIVES=3;
const TH2=5, TH3=8; // reveals thresholds for x2 / x3

let S=null;

const $=id=>document.getElementById(id);
const grid=$('grid'), ovl=$('ovl');

function newField(){
  // loot: 6 coins of 2, 3 chests of 4, 1 gem of 7  => 31 total
  const cells=Array.from({length:SIZE*SIZE},()=>({trap:false,val:0,open:false}));
  const idx=[...cells.keys()];
  shuffle(idx);
  let p=0;
  for(let i=0;i<TRAPS;i++)cells[idx[p++]].trap=true;
  for(let i=0;i<6;i++)cells[idx[p++]].val=2;
  for(let i=0;i<3;i++)cells[idx[p++]].val=4;
  cells[idx[p++]].val=7;
  return cells;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}}
function neigh(i){
  const r=i/SIZE|0,c=i%SIZE,out=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc)continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE)out.push(nr*SIZE+nc);
  }
  return out;
}
function trapCount(i){return neigh(i).filter(j=>S.field[j].trap).length}
function mult(){return S.reveals>=TH3?3:S.reveals>=TH2?2:1}

function start(){
  S={level:1,quota:QUOTA0,prog:0,dives:DIVES,banked:0,
     field:newField(),pack:0,reveals:0,live:true,firstTap:true};
  render();renderGrid();
}
function nextDive(){
  S.field=newField();S.pack=0;S.reveals=0;S.live=true;S.firstTap=true;
  render();renderGrid();
}

function tap(i){
  if(!S.live)return;
  const cell=S.field[i];
  if(cell.open)return;
  // first reveal of a dive is always safe
  if(S.firstTap&&cell.trap){
    const free=S.field.findIndex(c=>!c.trap&&!c.open&&!c.val);
    cell.trap=false;S.field[free===-1?0:free].trap=true;
  }
  S.firstTap=false;
  cell.open=true;

  if(cell.trap){
    S.live=false;
    navigator.vibrate&&navigator.vibrate([60,40,120]);
    renderGrid();render();
    setTimeout(()=>endDive(true),650);
    return;
  }
  S.reveals++;
  if(cell.val){
    S.pack+=cell.val;
    flyCoin(i,cell.val);
  }
  renderGrid();render();
  // field fully cleared of safe cells -> auto leave
  if(S.field.every(c=>c.trap||c.open))setTimeout(()=>leave(),350);
}

function leave(){
  if(!S.live||S.pack===0&&S.reveals===0)return;
  S.live=false;
  const gain=S.pack*mult();
  S.prog+=gain;S.banked+=gain;
  render();
  setTimeout(()=>endDive(false,gain),250);
}

function endDive(died,gain){
  S.dives--;
  if(S.prog>=S.quota){return showLevelUp()}
  if(S.dives<=0){return showGameOver()}
  showDiveEnd(died,gain);
}

function showDiveEnd(died,gain){
  const left=S.quota-S.prog;
  show(died
    ? `<h2>💀 Ловушка!</h2>
       <div class="big bad">−${S.pack}</div>
       <p>Рюкзак сгорел. До цели ещё <b>${left} 💰</b>, осталось заходов: <b>${S.dives}</b>.</p>
       <button class="btn btn-go" id="go">Новый заход</button>`
    : `<h2>Ушёл вовремя</h2>
       <div class="big ok">+${gain}</div>
       <p>До цели ещё <b>${left} 💰</b>, осталось заходов: <b>${S.dives}</b>.</p>
       <button class="btn btn-go" id="go">Новый заход</button>`);
  $('go').onclick=()=>{hide();nextDive()};
}
function showLevelUp(){
  const surplus=S.prog-S.quota;
  show(`<h2>✨ Уровень пройден</h2>
    <div class="big ok">${S.prog} / ${S.quota}</div>
    <p>${surplus>0?`Излишек <b>+${surplus} 💰</b> переходит дальше.`:'Ровно по плану.'}</p>
    <button class="btn btn-go" id="go">Уровень ${S.level+1} →</button>`);
  $('go').onclick=()=>{
    hide();
    S.level++;S.quota=QUOTA0+QUOTA_STEP*(S.level-1);
    S.prog=Math.max(0,surplus);S.dives=DIVES;
    nextDive();
  };
}
function showGameOver(){
  show(`<h2>Экспедиция окончена</h2>
    <div class="big amb">Уровень ${S.level}</div>
    <p>Не хватило <b>${S.quota-S.prog} 💰</b> до цели.<br>Всего добыто за игру: <b>${S.banked} 💰</b></p>
    <button class="btn btn-go" id="go">Сыграть ещё</button>`);
  $('go').onclick=()=>{hide();start()};
}
function showIntro(){
  show(`<div class="subtitle">прототип</div>
    <div class="title">РАСКОП</div>
    <div class="rules">
      <div><span class="i">👆</span><span>Вскрывай клетки. Цифра — сколько ловушек вокруг.</span></div>
      <div><span class="i">💰</span><span>Монеты падают в рюкзак. Наступил на ловушку 💀 — рюкзак сгорает.</span></div>
      <div><span class="i">🔥</span><span>Чем дольше копаешь за заход, тем выше множитель: 5 клеток — ×2, 8 — ×3.</span></div>
      <div><span class="i">🚪</span><span>«Уйти» можно в любой момент — добыча сохраняется. Собери цель уровня за 3 захода.</span></div>
    </div>
    <button class="btn btn-go" id="go">Копать</button>`);
  $('go').onclick=()=>{hide()};
}
function show(html){ovl.innerHTML=`<div class="ovl"><div class="card">${html}</div></div>`}
function hide(){ovl.innerHTML=''}

function flyCoin(i,val){
  const el=grid.children[i].getBoundingClientRect();
  const f=document.createElement('div');
  f.className='fly';f.textContent='+'+val+' 💰';
  f.style.left=(el.left+el.width/2-18)+'px';f.style.top=(el.top-4)+'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),700);
}

function renderGrid(){
  grid.innerHTML='';
  S.field.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='c'+(c.open?' open':'');
    if(c.open){
      if(c.trap){d.classList.add('trap');d.textContent='💀'}
      else{
        const n=trapCount(i);
        if(c.val){
          d.innerHTML=`<div class="loot"><span class="ic">${c.val>=7?'💎':c.val>=4?'🧰':'🪙'}</span><span class="v">${n||''}</span></div>`;
        }else if(n){
          d.innerHTML=`<span class="num ${n>=3?'hot':n===2?'warm':''}">${n}</span>`;
        }else{d.classList.add('n0');d.textContent='·'}
      }
    }
    d.onclick=()=>tap(i);
    grid.appendChild(d);
  });
}

function render(){
  $('lvl').textContent=S.level;
  $('quota').textContent=S.quota;
  $('prog').textContent=S.prog;
  $('qbar').style.width=Math.min(100,S.prog/S.quota*100)+'%';
  $('dives').innerHTML=Array.from({length:DIVES},(_,k)=>`<span class="${k<S.dives?'on':'off'}">●</span>`).join('');
  $('pack').textContent=S.pack;
  const m=mult();
  $('multTxt').textContent=m;
  $('total').textContent=S.pack*m;
  const me=$('mult');me.textContent='×'+m;me.className='mult'+(m===3?' x3':m===2?' x2':'');
  $('fuse').style.width=Math.min(100,S.reveals/(TH3+1)*100)+'%';
  $('fuseHint').innerHTML=m===3?'<b>Максимальная жадность ×3</b>'
    :m===2?`Ещё <b>${TH3-S.reveals}</b> клеток до <b>×3</b>`
    :`Ещё <b>${TH2-S.reveals}</b> клеток до <b>×2</b>`;
  const btn=$('leaveBtn');
  btn.disabled=!S.live||S.pack===0;
  btn.textContent=S.pack?`Уйти и забрать ${S.pack*m} 💰`:'Уйти (рюкзак пуст)';
  btn.onclick=leave;
}

start();showIntro();
})();
</script>
</body>
</html>
