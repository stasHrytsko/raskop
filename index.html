<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Раскоп — прототип</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <div class="top">
    <div class="lvl">Уровень <b id="lvl">1</b></div>
    <div class="dives" id="dives"></div>
  </div>
  <div class="quota">
    <div class="quota-label"><span>Цель уровня</span><b><span id="prog">0</span> / <span id="quota">25</span> 💰</b></div>
    <div class="bar"><i id="qbar"></i></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="pack">
    <div class="pack-row">
      <div class="sum">🎒 <span id="pack">0</span> <small>× <span id="multTxt">1</span> = <span id="total">0</span></small></div>
      <div class="mult" id="mult">×1</div>
    </div>
    <div class="fuse"><i id="fuse"></i><span class="tick" style="left:55.5%"></span><span class="tick" style="left:88.8%"></span></div>
    <div class="fuse-hint" id="fuseHint"></div>
  </div>

  <button class="btn btn-leave" id="leaveBtn">Уйти и забрать 0</button>
</div>

<div id="ovl"></div>

<!-- Порядок важен: config → field → ui → render → game -->
<script src="js/config.js"></script>
<script src="js/field.js"></script>
<script src="js/ui.js"></script>
<script src="js/render.js"></script>
<script src="js/game.js"></script>
</body>
</html>
